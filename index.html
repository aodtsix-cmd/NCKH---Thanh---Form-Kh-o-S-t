<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khảo sát về ý định mua và ý định thuê nhà của giới trẻ tại Việt Nam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THÔNG SỐ CẦN SỬA — dán link Web App Apps Script vào đây
   (Hướng dẫn lấy link ở file "HUONG_DAN_KET_NOI_SHEET.md")
   ============================================================ */
:root{
  --ink:#17233D; --ink-soft:#48587A; --muted:#77839B;
  --paper:#EEF2F9; --paper-2:#E5EBF6; --card:#FFFFFF;
  --honey:#F0A93B; --honey-deep:#D9871A; --honey-tint:#FDF1DC;
  --mint:#2FA98C; --mint-tint:#E1F4EF;
  --rose:#E1596A; --rose-tint:#FBE7EA;
  --line:#E2E7F1; --line-2:#D3DBEA;
  --shadow:0 18px 46px -22px rgba(23,35,61,.42);
  --shadow-sm:0 8px 22px -14px rgba(23,35,61,.4);
  --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Be Vietnam Pro",system-ui,sans-serif;
  color:var(--ink); background:
    radial-gradient(1200px 620px at 84% -8%, #FCE8C6 0%, rgba(252,232,198,0) 55%),
    radial-gradient(1050px 640px at 6% 108%, #D6E2F6 0%, rgba(214,226,246,0) 55%),
    var(--paper);
  min-height:100dvh; line-height:1.55; -webkit-font-smoothing:antialiased;
  padding:22px 16px 40px;
}
.wrap{max-width:760px;margin:0 auto}

/* ---------- top bar / progress ---------- */
.topbar{display:flex;align-items:flex-start;gap:12px;margin:2px 4px 16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13.5px;line-height:1.35;color:var(--ink);font-family:"Plus Jakarta Sans";max-width:78%}
.brand .dot{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--honey),var(--honey-deep));color:#fff;font-size:15px;box-shadow:var(--shadow-sm)}
.step-count{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--muted);letter-spacing:.02em;white-space:nowrap;padding-top:5px}
.track{position:relative;height:12px;border-radius:20px;background:var(--paper-2);
  box-shadow:inset 0 1px 3px rgba(23,35,61,.12);overflow:hidden;margin:0 4px}
.track .fill{position:absolute;inset:0 auto 0 0;width:0;border-radius:20px;
  background:linear-gradient(90deg,#F6C765,var(--honey) 55%,var(--honey-deep));
  transition:width .55s cubic-bezier(.22,1,.36,1)}
.track .fill::after{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  animation:sheen 2.4s linear infinite}
@keyframes sheen{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ---------- card ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:30px 30px 26px;position:relative;overflow:hidden}
.screen{display:none;animation:slideIn .5s cubic-bezier(.22,1,.36,1) both}
.screen.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{display:inline-flex;align-items:center;gap:7px;font-family:"Plus Jakarta Sans";
  font-weight:700;font-size:12px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--honey-deep);background:var(--honey-tint);padding:6px 12px;border-radius:20px;margin-bottom:14px;line-height:1.4}
h1.title{font-family:"Plus Jakarta Sans";font-weight:800;font-size:22px;line-height:1.32;letter-spacing:-.01em;color:var(--ink)}
h2.sec{font-family:"Plus Jakarta Sans";font-weight:800;font-size:21px;line-height:1.25;color:var(--ink);margin-bottom:4px}
.lead{color:var(--ink-soft);font-size:15px;margin-top:12px}
.lead p{margin-bottom:12px}
.lead p:last-child{margin-bottom:0}
.lead b{color:var(--ink);font-weight:700}
.sec-sub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
.sec-intro{color:var(--ink-soft);font-size:14px;line-height:1.6;background:var(--paper);border:1px solid var(--line);
  border-radius:14px;padding:14px 16px;margin-bottom:20px}
.sec-intro b{color:var(--ink)}

/* ---------- hero ---------- */
.hero-art{height:170px;border-radius:16px;margin:4px 0 20px;position:relative;overflow:hidden;background:#0F1B33}
.hero-art img{width:100%;height:100%;object-fit:cover;display:block}
.hero-art .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,27,51,.15),rgba(15,27,51,.55))}
.commit{display:flex;gap:12px;align-items:flex-start;margin-top:18px;padding:14px 16px;border-radius:14px;
  background:var(--mint-tint);border:1px solid #CDE9E1}
.commit .ic{font-size:19px;line-height:1.2}
.commit p{font-size:13.5px;color:#1F6E5B}

/* ---------- question blocks (choice) ---------- */
.qgrid{display:grid;gap:16px}
.q{border:1px solid var(--line);border-radius:16px;padding:16px 16px 15px;background:#FCFDFF;transition:border-color .2s,box-shadow .2s}
.q.answered{border-color:#C9E7DE;box-shadow:0 0 0 3px rgba(47,169,140,.09)}
.q .qlabel{font-weight:600;font-size:14.5px;margin-bottom:11px;display:flex;gap:9px;align-items:flex-start}
.q .qnum{flex:none;width:23px;height:23px;border-radius:7px;background:var(--honey-tint);color:var(--honey-deep);
  font-family:"Plus Jakarta Sans";font-weight:800;font-size:12px;display:grid;place-items:center;margin-top:1px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{flex:1 1 auto;min-width:calc(50% - 4px);border:1.5px solid var(--line-2);background:#fff;border-radius:12px;
  padding:11px 13px;font:inherit;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;text-align:left;
  transition:transform .12s,border-color .15s,background .15s,color .15s;display:flex;align-items:center;gap:9px}
.opt:hover{border-color:var(--honey);color:var(--ink)}
.opt:active{transform:scale(.98)}
.opt .rd{flex:none;width:17px;height:17px;border-radius:50%;border:2px solid var(--line-2);transition:.15s}
.opt.sel{border-color:var(--honey-deep);background:var(--honey-tint);color:var(--ink);font-weight:600}
.opt.sel .rd{border-color:var(--honey-deep);background:var(--honey-deep);box-shadow:inset 0 0 0 3px #fff}
.opt.full{min-width:100%}
.opt-inline{display:flex;gap:9px}
.opt-inline .opt{min-width:0;justify-content:center}
input.textin,select.selin{width:100%;margin-top:9px;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 13px;
  font:inherit;font-size:14px;color:var(--ink);background:#fff}
input.textin:focus,select.selin:focus{outline:none;border-color:var(--honey);box-shadow:0 0 0 3px var(--honey-tint)}
select.selin{cursor:pointer;appearance:none;
  background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2377839B' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 13px center;background-size:16px;padding-right:38px}

/* ---------- likert ---------- */
.likert-legend{display:flex;justify-content:space-between;gap:8px;margin:2px 2px 12px;
  font-size:11.5px;color:var(--muted);font-weight:600}
.likert-legend span:last-child{text-align:right}
.likert-key{display:grid;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:14px;
  padding:13px 15px;margin-bottom:20px}
.likert-key .row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-soft)}
.likert-key .row .e{font-size:17px;line-height:1;flex:none}
.likert-key .row .n{font-family:"Plus Jakarta Sans";font-weight:800;font-size:12.5px;color:var(--honey-deep);
  background:var(--honey-tint);border-radius:6px;width:21px;height:21px;display:grid;place-items:center;flex:none}
.likert-key .row b{color:var(--ink);font-weight:600}
.stmt{border:1px solid var(--line);border-radius:16px;padding:15px 16px 14px;margin-bottom:14px;background:#FCFDFF;transition:.2s}
.stmt.answered{border-color:#C9E7DE;box-shadow:0 0 0 3px rgba(47,169,140,.08)}
.stmt .stext{font-size:14.5px;font-weight:500;color:var(--ink);margin-bottom:12px;display:flex;gap:9px}
.stmt .snum{flex:none;width:22px;height:22px;border-radius:7px;background:var(--paper-2);color:var(--ink-soft);
  font-family:"Plus Jakarta Sans";font-weight:800;font-size:11.5px;display:grid;place-items:center;margin-top:1px}
.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.pill{border:1.5px solid var(--line-2);background:#fff;border-radius:13px;padding:10px 4px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .12s,border-color .15s,background .15s}
.pill .emo{font-size:22px;line-height:1;filter:grayscale(.35) opacity(.8);transition:.15s}
.pill .val{font-family:"Plus Jakarta Sans";font-weight:800;font-size:12px;color:var(--muted)}
.pill:hover{border-color:var(--honey)}
.pill:hover .emo{filter:none}
.pill.sel{border-color:var(--honey-deep);background:var(--honey-tint);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.pill.sel .emo{filter:none;animation:pop .32s cubic-bezier(.34,1.56,.64,1)}
.pill.sel .val{color:var(--honey-deep)}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.22)}100%{transform:scale(1)}}

/* ---------- nav ---------- */
.nav{display:flex;gap:12px;align-items:center;margin-top:24px}
.btn{font-family:"Plus Jakarta Sans";font-weight:700;font-size:15px;border:none;border-radius:14px;padding:14px 24px;cursor:pointer;transition:transform .12s,box-shadow .2s,filter .2s;display:inline-flex;align-items:center;gap:9px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(135deg,var(--honey),var(--honey-deep));color:#fff;box-shadow:0 12px 26px -12px rgba(217,135,26,.85)}
.btn-primary:hover{filter:brightness(1.04)}
.btn-primary.wide{width:100%;justify-content:center;font-size:16px;padding:16px}
.btn-ghost{background:transparent;color:var(--ink-soft);padding:14px 12px}
.btn-ghost:hover{color:var(--ink)}
.btn[disabled]{opacity:.55;cursor:not-allowed;filter:grayscale(.2)}
.spacer{flex:1}
.hint{font-size:12.5px;color:var(--muted);text-align:center;margin-top:12px}
.warn{color:var(--rose);font-weight:600}
.foot{text-align:center;font-size:12px;color:var(--muted);margin-top:20px}
.foot b{color:var(--ink-soft)}

/* ---------- review / thanks ---------- */
.center{text-align:center;padding:14px 6px}
.emoji-xl{font-size:58px;line-height:1;margin-bottom:12px;display:inline-block}
.thanks .ring{width:96px;height:96px;border-radius:50%;margin:0 auto 18px;display:grid;place-items:center;
  background:var(--mint-tint);border:2px solid #BFE8DC;animation:ringpop .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes ringpop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.thanks .ring span{font-size:46px;animation:pop .6s .15s both}
.msg{max-width:560px;margin:14px auto 0;color:var(--ink-soft);font-size:14.5px;text-align:left}
.msg p{margin-bottom:11px}
.msg p:last-child{margin-bottom:0}
.msg b{color:var(--ink);font-weight:700}

/* confetti */
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}
.confetti i{position:absolute;top:-24px;font-size:18px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(108vh) rotate(360deg);opacity:.15}}

@media (max-width:560px){
  body{padding:16px 12px 34px}
  .card{padding:24px 18px 22px;border-radius:18px}
  h1.title{font-size:19.5px}
  .brand{font-size:12.5px;max-width:100%}
  .step-count{font-size:11.5px}
  .hero-art{height:140px}
  .opt{min-width:100%}
  .scale{gap:5px}
  .pill{padding:9px 2px 7px;border-radius:11px}
  .pill .emo{font-size:20px}
  .likert-legend{font-size:10.5px}
  .btn{font-size:14px;padding:13px 18px}
  .msg{font-size:14px}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.05ms!important}
}
</style>
</head>

/* ---------------- Render ---------------- */
function render(){
  const s = STEPS[idx];
  window.scrollTo({top:0,behavior:"smooth"});
  const pct = idx===0 ? 4 : Math.round((idx/(STEPS.length-1))*100);
  fill.style.width = pct + "%";
  stepCount.textContent = idx===0 ? "" : "Bước " + idx + " / " + (STEPS.length-1);

  if(s.type==="intro") return renderIntro();
  if(s.type==="demo") return renderDemo();
  if(s.type==="likert") return renderLikert(s.ci);
  if(s.type==="review") return renderReview();
}

/* ---------- block builders ---------- */
function choiceBlock(field,label,num,opts,inline,hasOther){
  const optsHtml = opts.map(o=>{
    const sel = answers[field]===o?" sel":"";
    return `<button type="button" class="opt${sel}${inline?"":" full"}" data-f="${field}" data-v="${esc(o)}" onclick="pick(this)"><span class="rd"></span><span>${o}</span></button>`;
  }).join("");
  const otherSel = (answers[field]&&!opts.includes(answers[field]))?answers[field]:"";
  const other = hasOther?`<input class="textin" placeholder="Mục khác (ghi rõ)…" value="${esc(otherSel)}" oninput="pickOther('${field}',this.value)">`:"";
  const ans = answers[field]!=null?" answered":"";
  return `<div class="q${ans}" id="q_${field}">
    <div class="qlabel"><span class="qnum">${num}</span><span>${label}</span></div>
    <div class="opts ${inline?'opt-inline':''}">${optsHtml}</div>${other}
  </div>`;
}
function stmtBlock(code,i,txt){
  const field = code+(i+1);
  const cur = answers[field];
  const ans = cur!=null?" answered":"";
  const pills = LIKERT.map(l=>{
    const sel = cur===l.v?" sel":"";
    return `<button type="button" class="pill${sel}" data-f="${field}" data-v="${l.v}" title="${l.v} – ${l.t}" onclick="pickLikert(this)">
      <span class="emo">${l.emo}</span><span class="val">${l.v}</span></button>`;
  }).join("");
  return `<div class="stmt${ans}" id="q_${field}">
    <div class="stext"><span class="snum">${i+1}</span><span>${txt}</span></div>
    <div class="scale">${pills}</div>
  </div>`;
}

/* ---------- interactions ---------- */
function pick(btn){
  const f=btn.dataset.f;
  answers[f]=btn.dataset.v;
  const box=document.getElementById("q_"+f);
  box.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  btn.classList.add("sel");
  box.classList.add("answered");
  const inp=box.querySelector("input.textin");
  if(inp) inp.value="";
}
function pickOther(field,val){
  const box=document.getElementById("q_"+field);
  if(val.trim()){
    answers[field]=val;
    box.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
    box.classList.add("answered");
  }else{ delete answers[field]; box.classList.remove("answered"); }
}
function pickRef(val){
  refCode = val;
  answers.NguoiGioiThieu = val;
  const box=document.getElementById("q_REF");
  if(box) box.classList.toggle("answered", !!val);
}
function pickLikert(btn){
  const f=btn.dataset.f;
  answers[f]=parseInt(btn.dataset.v,10);
  const box=document.getElementById("q_"+f);
  box.querySelectorAll(".pill").forEach(o=>o.classList.remove("sel"));
  btn.classList.add("sel");
  box.classList.add("answered");
  const s=STEPS[idx];
  if(s.type==="likert"){
    const c=CONSTRUCTS[s.ci];
    const done=c.items.filter((_,i)=>answers[c.code+(i+1)]!=null).length;
    const h=document.getElementById("hint");
    if(h) h.innerHTML = done<c.items.length?`Đã trả lời <b>${done}/${c.items.length}</b> nhận định`:"👍 Đã xong phần này!";
  }
}

/* ---------- navigation ---------- */
function next(){
  const s=STEPS[idx];
  if(s.type==="demo"){
    const miss=DEMO.filter(d=>answers[d.code]==null).map(d=>d.code);
    if(!refCode) miss.push("REF");
    if(miss.length){ highlightMissing(miss); return warnHint(`Còn ${miss.length} mục chưa chọn.`); }
  }
  if(s.type==="likert"){
    const c=CONSTRUCTS[s.ci];
    const miss=c.items.map((_,i)=>c.code+(i+1)).filter(f=>answers[f]==null);
    if(miss.length){ highlightMissing(miss); return warnHint(`Còn ${miss.length} nhận định chưa chọn mức độ.`); }
  }
  idx++; render();
}
function prev(){ if(idx>0){ idx--; render(); } }
function warnHint(msg){ const h=document.getElementById("hint"); if(h) h.innerHTML=`<span class="warn">⚠️ ${msg}</span>`; }
function highlightMissing(fields){
  fields.forEach(f=>{ const el=document.getElementById("q_"+f);
    if(el){ el.style.borderColor="var(--rose)"; el.style.boxShadow="0 0 0 3px var(--rose-tint)";
      setTimeout(()=>{el.style.borderColor="";el.style.boxShadow="";},1800);} });
  const first=document.getElementById("q_"+fields[0]); if(first) first.scrollIntoView({behavior:"smooth",block:"center"});
}
   /* ---------- sinh mã minh chứng ---------- */
const MA_KYTU = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
function sinhMa(){
  let s = "";
  const r = new Uint32Array(6);
  crypto.getRandomValues(r);
  for (let i = 0; i < 6; i++) s += MA_KYTU[r[i] % MA_KYTU.length];
  return s;
}
let maCaNhan = "", maChungSuc = "";

/* ---------- submit ---------- */
async function submitForm(){
  const ok=CONSTRUCTS.every(cc=>cc.items.every((_,i)=>answers[cc.code+(i+1)]!=null));
  if(!ok){ return warnHint("Còn nhận định chưa trả lời — vui lòng quay lại kiểm tra."); }
  const btn=document.getElementById("submitBtn");
  btn.disabled=true; btn.innerHTML="⏳ Đang gửi…";

  maCaNhan=sinhMa(); maChungSuc=sinhMa();
  const payload = buildPayload();
  try{
    if(ENDPOINT && !ENDPOINT.startsWith("PASTE")){
      await fetch(ENDPOINT,{ method:"POST", mode:"no-cors",
        headers:{"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},
        body:new URLSearchParams(payload).toString() });
    }else{
      console.log("[DEMO] Chưa gắn ENDPOINT. Payload:",payload);
      await new Promise(r=>setTimeout(r,700));
    }
    thankYou();
  }catch(err){
    console.error(err);
    btn.disabled=false; btn.innerHTML="🚀 Gửi lại";
    warnHint("Có lỗi mạng khi gửi. Vui lòng kiểm tra kết nối và thử lại.");
  }
}
function buildPayload(){
  const p={ timestamp:new Date().toISOString() };
  DEMO.forEach(d=>p[d.code]=answers[d.code]||"");
  p["NguoiGioiThieu"]=refCode||"";
   p["MaCaNhan"]=maCaNhan; p["MaChungSuc"]=maChungSuc;
  CONSTRUCTS.forEach(c=>c.items.forEach((_,i)=>{ var vv=answers[c.code+(i+1)]; p[c.code+(i+1)]=(vv==null?"":vv); }));
  return p;
}

<div style="font-weight:700;color:#17233D;margin-bottom:6px">Mã xác nhận phản hồi</div>

      <button onclick="navigator.clipboard.writeText('Mã phản hồi: ${maCaNhan}\\nMã giới thiệu: ${maChungSuc}').then(()=>this.textContent='✓ Đã sao chép')" style="margin-top:16px;width:100%;font-family:inherit;font-weight:700;font-size:14px;background:#F0A93B;color:#fff;border:none;border-radius:12px;padding:12px;cursor:pointer">📋 Sao chép cả hai mã</button>
    </div>

  </div>`;
  fill.style.width="100%"; stepCount.textContent="Hoàn tất ✓";
}
function launchConfetti(){
  const wrap=document.createElement("div"); wrap.className="confetti";
  const icons=["🏠","🔑","💙","🎉","✨","🏡"];
  for(let i=0;i<26;i++){ const s=document.createElement("i");
    s.textContent=icons[i%icons.length];
    s.style.left=Math.random()*100+"vw";
    s.style.fontSize=(14+Math.random()*16)+"px";
    s.style.animationDuration=(2.6+Math.random()*2.2)+"s";
    s.style.animationDelay=(Math.random()*0.6)+"s";
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap); setTimeout(()=>wrap.remove(),5200);
}

/* ---------- util ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
